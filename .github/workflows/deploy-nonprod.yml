name: Deploy NonProd

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "todo-app-nonprod"
  TF_VAR_FILE: "todo-app-nonprod/ap-south-1/todo-app-nonprod.tfvars"
  WORKING_DIR: "infra/terraform"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform init

    - name: Terraform Apply (Target ECR)
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform apply -target=aws_ecr_repository.app_repo -var-file="${{ env.TF_VAR_FILE }}" -auto-approve

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Terraform Apply (Full Infrastructure)
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform apply -var-file="${{ env.TF_VAR_FILE }}" -auto-approve
